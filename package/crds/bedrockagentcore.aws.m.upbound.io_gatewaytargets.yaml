              initProvider:
                description: |-
                  THIS IS A BETA FIELD. It will be honored
                  unless the Management Policies feature flag is disabled.
                  InitProvider holds the same fields as ForProvider, with the exception
                  of Identifier and other resource reference fields. The fields that are
                  in InitProvider are merged into ForProvider when the resource is created.
                  The same fields are also added to the terraform ignore_changes hook, to
                  avoid updating them after creation. This is useful for fields that are
                  required on creation, but we do not desire to update them after creation,
                  for example because of an external controller is managing them, like an
                  autoscaler.
                properties:
                  credentialProviderConfiguration:
                    description: Configuration for authenticating requests to the
                      target. Required when using lambda, open_api_schema and smithy_model
                      in mcp block. If using mcp_server in mcp block with no authorization,
                      it should not be specified. See credential_provider_configuration
                      below.
                    properties:
                      apiKey:
                        description: API key-based authentication configuration. See
                          api_key below.
                        properties:
                          credentialLocation:
                            description: 'Location where the API key credential is
                              provided. Valid values: HEADER, QUERY_PARAMETER.'
                            type: string
                          credentialParameterName:
                            description: Name of the parameter containing the API
                              key credential.
                            type: string
                          credentialPrefix:
                            description: Prefix to add to the API key credential value.
                            type: string
                          providerArn:
                            description: ARN of the OIDC provider for API key authentication.

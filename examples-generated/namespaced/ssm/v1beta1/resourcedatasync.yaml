apiVersion: ssm.aws.m.upbound.io/v1beta1
kind: ResourceDataSync
metadata:
  annotations:
    meta.upbound.io/example-id: ssm/v1beta1/resourcedatasync
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    region: us-west-1
    s3Destination:
      bucketNameSelector:
        matchLabels:
          testing.upbound.io/example-name: example
      regionSelector:
        matchLabels:
          testing.upbound.io/example-name: example

---

apiVersion: s3.aws.m.upbound.io/v1beta1
kind: Bucket
metadata:
  annotations:
    crossplane.io/external-name: ${Rand.RFC1123Subdomain}
    meta.upbound.io/example-id: ssm/v1beta1/resourcedatasync
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    region: us-west-1

---

apiVersion: s3.aws.m.upbound.io/v1beta1
kind: BucketPolicy
metadata:
  annotations:
    meta.upbound.io/example-id: ssm/v1beta1/resourcedatasync
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    bucketSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    policy: ${data.aws_iam_policy_document.example.json}
    region: us-west-1
